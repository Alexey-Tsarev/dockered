  # Nginx stable
  # https://nginx.org/en/download.html
  nginx-stable:
    build:
      context: nginx_and_forks-x.y.z
      network: host
      args:
        - APP_NAME=nginx-stable
        - APP_SHORT=nginx
        - APP_SRC_URL=https://nginx.org/download/nginx-1.30.2.tar.gz
        - APP_VERSION=1.30.2
      tags:
        - alexeytsarev/nginx:stable

    image: alexeytsarev/nginx:1.30.2
    container_name: nginx-stable
    restart: unless-stopped

    #network_mode: host
    network_mode: bridge
    ports:
      - "80:80"
      - "443:443"

    environment:
      - TERM=xterm

    volumes:
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      #- ${DOCKER_ROOT}/nginx-stable/sites-enabled/:/opt/nginx/conf/sites-enabled/
      #- ${DOCKER_ROOT}/cert/:/opt/cert/
      #- ${DOCKER_ROOT}/log/nginx-stable/:/opt/nginx/log/
      #- /home/:/home/

    logging:
      driver: journald
      options:
        tag: nginx-stable
  # End Nginx stable



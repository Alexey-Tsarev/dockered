  # End acme


  # MariaDB
  mariadb:
    build:
      context: mariadb-12.3
      network: host

    image: alexeytsarev/mariadb:12.3
    container_name: mysql
    restart: unless-stopped

    network_mode: host
    #network_mode: bridge
    #ports:
    #  - "3306:3306"

    environment:
      - TERM=xterm
      - MYSQL_USER
      - MYSQL_MAX_CONNECTIONS
      - MYSQL_RUN_BEFORE
      - MYSQL_LISTEN_PORT=3306

    logging:
      driver: journald
      options:
        tag: mysql

    volumes:
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

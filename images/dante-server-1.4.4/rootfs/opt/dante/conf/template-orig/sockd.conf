#logoutput: syslog
#logoutput: stdout
#logoutput: /opt/dante/log/dante.log

user.privileged: root
user.unprivileged: nobody

internal: 127.0.0.1 port = ${LISTEN_PORT:-1080}
external: ${EXTERNAL:-eth0}

socksmethod: none
clientmethod: none
resolveprotocol: fake

client pass {
    from: 127.0.0.1/32 to: 0.0.0.0/0
    log: connect disconnect error
}

socks pass {
    from: 127.0.0.1/32 to: 0.0.0.0/0
    protocol: tcp udp
    log: connect disconnect error
}

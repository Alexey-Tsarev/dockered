[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
pidfile=/run/supervisord.pid

[program:cron]
command=cron -f
autorestart=true

[program:acme]
environment=ACME_REGISTER_ACCOUNT=1,ACME_ISSUE=1,ACME_INSTALL_CERT=1
command=/acme_handler.sh
startretries=1
autorestart=false
stdout_logfile=/opt/log/acme.log
redirect_stderr=true

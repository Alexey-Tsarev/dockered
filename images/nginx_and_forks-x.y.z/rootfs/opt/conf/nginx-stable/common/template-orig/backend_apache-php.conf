        location ~ /\.ht {
            deny all;
        }

        location ~* (/|\.php|\.phtm|\.phtml)$$ {
            error_page 418 = @backend;
            return 418;
        }

        # Catch all: serve a file if it exists, otherwise pass to backend
        location / {
            try_files $$uri @backend;
        }

        location @backend {
            proxy_pass http://$$backend_ip:$$backend_port;
            include common/proxy_params.conf;
            limit_req zone=req_zone_ip burst=150 delay=100;
        }

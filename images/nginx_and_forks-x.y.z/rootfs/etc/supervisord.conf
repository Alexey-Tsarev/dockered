[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
pidfile=/run/supervisord.pid

[program:cron]
command=cron -f
autorestart=true

[program:nginx]
command=/nginx.sh
autorestart=true
stdout_logfile=/opt/app/log/output.log
redirect_stderr=true
restart_directory_monitor=/opt/cert
restart_file_pattern=acme_renew_datetime.log
restart_cmd_when_file_changed=nginx -s reload
